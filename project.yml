name: HyperCreditsMenubar
options:
  bundleIdPrefix: com.ilyakooo0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  HyperCreditsMenubar:
    type: application
    platform: macOS
    sources:
      - path: HyperCreditsMenubar
        excludes:
          - "Info.plist"
          - "*.entitlements"
    resources:
      - HyperCreditsMenubar/Assets.xcassets
    info:
      path: HyperCreditsMenubar/Info.plist
      properties:
        CFBundleName: HyperCreditsMenubar
        CFBundleDisplayName: Hyper Credits
        CFBundleIdentifier: com.ilyakooo0.hyper-credits-menubar
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilyakooo0.hyper-credits-menubar
        PRODUCT_NAME: HyperCreditsMenubar
        INFOPLIST_FILE: HyperCreditsMenubar/Info.plist
        CODE_SIGN_ENTITLEMENTS: HyperCreditsMenubar/HyperCreditsMenubar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  HyperCreditsMenubarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HyperCreditsMenubarTests
    dependencies:
      - target: HyperCreditsMenubar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilyakooo0.hyper-credits-menubar.tests
        PRODUCT_NAME: HyperCreditsMenubarTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HyperCreditsMenubar.app/Contents/MacOS/HyperCreditsMenubar"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  HyperCreditsMenubar:
    build:
      targets:
        HyperCreditsMenubar: all
        HyperCreditsMenubarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HyperCreditsMenubarTests
    archive:
      config: Release
